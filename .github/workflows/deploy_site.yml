name: Build and Deploy Site

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Run browser asset and theme contract tests
        run: npm test

      - name: Validate _news geo front matter
        run: node scripts/qa/validate-news-geo.mjs

      - name: Validate publication tags
        run: node scripts/qa/validate-publication-tags.mjs

      - name: Validate publication method tags
        run: node scripts/qa/validate-publication-method-tags.mjs

      - name: Generate career and talk map data
        run: node scripts/build-career-geo-data.mjs

      - name: Validate talk map data and runtime
        run: npm run check:talkmap

      - name: Generate impact dashboard data
        run: python3 scripts/build-impact-dashboard-data.py --repo-root "$GITHUB_WORKSPACE" --out-dir "$GITHUB_WORKSPACE/data/impact"

      - name: Verify committed impact reach data
        run: |
          test -f data/impact/reach/outlet_reach.json
          test -f data/impact/reach/reach_metadata.json
          test -f data/impact/reach/time_adjusted_mentions_reach.json
          test -f data/impact/reach/time_adjusted_outlet_reach.json
          test -f data/impact/reach/tranco_snapshots_used.json

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Verify all supported theme builds
        run: npm run test:themes

      - name: Build site
        run: bundle exec jekyll build --safe --config _config.yml

      - name: Validate rendered integrations
        run: npm run check:integrations:built

      - name: Validate rendered local resources
        run: npm run check:assets

      - name: Validate Pages artifact
        run: npm run check:site-artifact

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./_site

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
