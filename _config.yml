# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve`. If you change this file, please restart the server process.

# Site Settings
locale                   : "en-US"
site_theme               : "default" # Options: default, air, sunrise, mint, dirt, contrast
title                    : "Jacob S. Berv, PhD"
title_separator          : "-"
name                     : &name "Jacob S. Berv"
description              : &description "Evolutionary Biologist and Schmidt AI in Science Fellow at the University of Michigan"
url                      : https://jakeberv.com # the base hostname & protocol for your site e.g. "https://mmistakes.github.io"
baseurl                  : "" # the subpath of your site, e.g. "/blog"
repository               : "jakeberv/jakeberv.github.io"
teaser                   : # filename of teaser fallback teaser image placed in /images/, .e.g. "500x300.png"
breadcrumbs              : true # true, false (default)
words_per_minute         : 160
future                   : false
read_more                : "disabled" # if enabled, adds "Read more" links to excerpts
talkmap_link             : false #change to true to add link to talkmap on talks page
comments:
  provider               : # blank (default), "disqus", "discourse", "facebook", "custom"
  disqus:
    shortname            :
  discourse:
    server               : # full HTTPS URL, e.g. https://meta.discourse.org
  facebook:
    appid                :
    sdk_version          : # explicit Graph API version, e.g. v24.0
    num_posts            : # 5 (default)
    colorscheme          : # "light" (default), "dark"
#atom_feed:
#  path                   : # blank (default) uses feed.xml

feed:
  excerpt_only: false
  collections:
    - news
    - publications

# SEO Related
google_site_verification :
bing_site_verification   :
alexa_site_verification  :
yandex_site_verification :

# Social Sharing
twitter:
  username               : jakeberv
facebook:
  username               :
  app_id                 :
  publisher              :
og_image                 : profile.png # Open Graph/Twitter default site image
# For specifying social profiles
# - https://developers.google.com/structured-data/customize/social-profiles
social:
  type: Person
  name: "Jacob S. Berv"
  links:
    - https://scholar.google.com/citations?user=cQQaGZQAAAAJ&hl=en
    - https://github.com/jakeberv
    - https://orcid.org/0000-0002-5962-0621
    - https://x.com/jakeberv
    - https://bsky.app/profile/jakeberv.bsky.social
    - https://www.linkedin.com/in/jakeberv/


# Analytics
analytics:
  providers:
    - goatcounter
    - google-analytics-4
  google:
    tracking_id          :
  goatcounter:
    code                 : jakeberv


# Site Author
