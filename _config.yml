  avatar           : "profile.png"
  pronouns         :
  bio              : "Evolutionary Biologist and barbeque enthusiast"
  location         : "Ann Arbor, Michigan"
  employer         : "University of Michigan"
  academia         :
  arxiv            :
  inspire-hep      :
  pubmed           :
  googlescholar    : "https://scholar.google.com/citations?user=cQQaGZQAAAAJ&hl=en"
  scopus           :
  semantic         :
  ssrn             :
  zotero           :
  email            : "jberv@umich.edu"
  researchgate     : 
  uri              :
  artstation       :
  bitbucket        :
  bluesky          : "jakeberv.bsky.social"
  codepen          :
  dribbble         :
  flickr           :
  facebook         :
  foursquare       :
  github           : "jakeberv"
  gitlab           :
  goodreads        :
  kaggle           :
  keybase          :
  instagram        :
  impactstory      :
  lastfm           :
  linkedin         : "jakeberv"
  mastodon         :
