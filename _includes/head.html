{% include base_path %}

<meta charset="utf-8">

{% include seo.html %}

<link href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ base_path }}/feed.xml{% endif %}" type="application/atom+xml" rel="alternate" title="{{ site.title }} Feed">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
  (function () {
    var root = document.documentElement;
    var savedTheme = null;

    try {
      savedTheme = window.localStorage.getItem("theme");
    } catch (error) {
      savedTheme = null;
    }

    if (savedTheme === "dark") {
      root.setAttribute("data-theme", "dark");
    } else {
      root.removeAttribute("data-theme");
    }

    root.className = root.className.replace(/\bno-js\b/g, "") + " js ";
  }());
</script>

<!-- For all browsers -->
{% if site.search.enabled %}
<link rel="stylesheet" href="{{ base_path }}/pagefind/pagefind-component-ui.css">
{% endif %}
<link rel="stylesheet" href="{{ base_path }}/assets/css/main.css">
{% if site.search.enabled %}
<script type="module" src="{{ base_path }}/pagefind/pagefind-component-ui.js"></script>
{% endif %}
