<section
  class="talkmap-shell"
  id="talkMapApp"
  aria-labelledby="talkMapTitle"
  data-data-url="{{ '/data/talkmap/talk_events.json' | relative_url }}"
  data-world-url="https://cdn.jsdelivr.net/npm/world-atlas@2.0.2/countries-110m.json"
  data-world-url-fallback="https://unpkg.com/world-atlas@2.0.2/countries-110m.json">
  <div class="talkmap-controls" aria-label="Talk map filters">
    <div class="talkmap-control-group" aria-label="Speaking type">
      <button type="button" class="talkmap-chip is-active" data-talk-tag="conference_talk" aria-pressed="true">Conference</button>
      <button type="button" class="talkmap-chip is-active" data-talk-tag="invited_talk" aria-pressed="true">Invited</button>
      <button type="button" class="talkmap-chip is-active" data-talk-tag="guest_lecture" aria-pressed="true">Guest lecture</button>
      <button type="button" class="talkmap-chip is-active" data-talk-tag="keynote" aria-pressed="true">Keynote</button>
      <button type="button" class="talkmap-chip is-active" data-talk-tag="workshop_led" aria-pressed="true">Workshop</button>
      <button type="button" class="talkmap-chip is-active" data-talk-tag="outreach" aria-pressed="true">Outreach</button>
    </div>
    <div class="talkmap-control-group" aria-label="Time window">
      <button type="button" class="talkmap-chip is-active" data-talk-window="all" aria-pressed="true">All time</button>
      <button type="button" class="talkmap-chip" data-talk-window="10" aria-pressed="false">10 years</button>
      <button type="button" class="talkmap-chip" data-talk-window="5" aria-pressed="false">5 years</button>
    </div>
  </div>

  <p class="talkmap-status" data-talk-status role="status" aria-live="polite">Loading speaking locations...</p>

  <div class="talkmap-layout">
    <div class="talkmap-figure">
      <h2 class="talkmap-title" id="talkMapTitle">Speaking locations</h2>
      <svg class="talkmap-map" data-talk-map viewBox="0 0 960 520" role="group" aria-labelledby="talkMapTitle"></svg>
      <div class="talkmap-tooltip" data-talk-tooltip role="status" hidden></div>
    </div>

    <aside class="talkmap-events" aria-labelledby="talkMapEventsTitle">
      <div class="talkmap-events__header">
        <h2 id="talkMapEventsTitle">Events in view</h2>
        <span data-talk-count aria-live="polite">0</span>
      </div>
      <ol class="talkmap-event-list" data-talk-list></ol>
    </aside>
  </div>
</section>
