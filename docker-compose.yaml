services:
  site:
    build:
      context: .
      args:
        USER_UID: "${USER_UID:-1000}"
        USER_GID: "${USER_GID:-1000}"
    ports:
      - "127.0.0.1:4001:4001"
    volumes:
      - .:/workspace
      - bundle:/usr/local/bundle
      - node_modules:/workspace/node_modules
    command: >-
      bash -lc './scripts/container_bootstrap.command && exec ./scripts/local_preview.command --full-build --skip-data --port 4001'
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"from urllib.request import urlopen; response = urlopen('http://127.0.0.1:4001/', timeout=2); response.read(); response.close()\""]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 15s

volumes:
  bundle:
  node_modules:
